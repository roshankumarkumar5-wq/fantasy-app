<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password - Fantasy App</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="topbar"><h1>Fantasy League</h1></div>
  <div class="container">
    <div class="card">
      <h2>Forgot Password</h2>
      <p class="match-meta">Enter your account email and we'll text a reset code to the phone number on file.</p>
      <label>Account Email</label>
      <input type="email" id="email" placeholder="you@example.com">
      <button class="btn" id="sendBtn">Send Reset Code</button>
      <div class="error-msg" id="errorMsg"></div>
      <div class="success-msg" id="successMsg"></div>
    </div>
    <div class="link"><a href="login.html">Back to Log In</a></div>
  </div>

  <script>window.API_BASE_URL = 'https://fantasy-app-backend-znyu.onrender.com/api';</script>
  <script src="js/api.js"></script>
  <script>
    document.getElementById('sendBtn').addEventListener('click', async () => {
      const email = document.getElementById('email').value.trim();
      const errorMsg = document.getElementById('errorMsg');
      const successMsg = document.getElementById('successMsg');
      errorMsg.textContent = '';
      successMsg.textContent = '';

      if (!email) {
        errorMsg.textContent = 'Enter your account email';
        return;
      }

      try {
        await Api.forgotPassword({ email });
        successMsg.textContent = 'If an account exists for this email, a code has been texted to the phone on file.';
        setTimeout(() => {
          window.location.href = `reset-password.html?email=${encodeURIComponent(email)}`;
        }, 1200);
      } catch (err) {
        errorMsg.textContent = err.message;
      }
    });
  </script>
</body>
</html>
