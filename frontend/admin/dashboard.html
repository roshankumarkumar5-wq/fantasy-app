<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body class="themed">
  <div class="topbar">
    <h1>Admin Panel</h1>
    <button id="logoutBtn">Log Out</button>
  </div>
  <div class="container">
    <div class="tab-nav">
      <a href="dashboard.html" class="active">Matches</a>
      <a href="teams-players.html">Teams &amp; Players</a>
      <a href="approvals.html">Approvals</a>
    </div>

    <div class="card">
      <h3>Create New Match</h3>
      <a href="create-match.html"><button class="btn">+ Schedule a Match</button></a>
    </div>

    <div id="matchList"><p>Loading matches...</p></div>
  </div>

  <script>window.API_BASE_URL = 'https://fantasy-app-backend-znyu.onrender.com/api';</script>
  <script src="../js/api.js"></script>
  <script>
    requireAdminLogin();

    document.getElementById('logoutBtn').addEventListener('click', () => {
      Auth.clearSession();
      window.location.href = '../login.html';
    });

    function teamLogo(team) {
      if (team?.logo_url) {
        return `<img src="${team.logo_url}" class="promo-team-logo" alt="${team.short_code || team.name}">`;
      }
      return `<div class="promo-team-logo-fallback">${(team?.short_code || '?').slice(0, 3)}</div>`;
    }

    async function loadMatches() {
      const container = document.getElementById('matchList');
      try {
        const matches = await Api.getMatches();
        if (matches.length === 0) {
          container.innerHTML = '<p>No matches yet.</p>';
          return;
        }
        container.innerHTML = matches.map(m => `
          <div class="promo-card" data-match-id="${m.id}">
            ${m.match_format ? `<div class="promo-format-tag">${m.match_format}</div>` : ''}
            <div class="promo-teams">
              <div class="promo-team">
                ${teamLogo(m.team_a)}
                <span class="promo-team-name">${m.team_a?.name || m.team_a?.short_code || '?'}</span>
              </div>
              <span class="promo-vs">VS</span>
              <div class="promo-team">
                ${teamLogo(m.team_b)}
                <span class="promo-team-name">${m.team_b?.name || m.team_b?.short_code || '?'}</span>
              </div>
            </div>
            <div class="promo-info-row">
              <div class="promo-info-box">
                <span class="promo-info-label">Date &amp; Time</span>
                <span class="promo-info-value">${formatIST(m.match_date)}</span>
              </div>
              ${m.venue ? `
              <div class="promo-info-box">
                <span class="promo-info-label">Venue</span>
                <span class="promo-info-value">${m.venue}</span>
              </div>` : ''}
            </div>
            <div class="promo-status-badge promo-status-${m.status}">${m.status}</div>
          </div>
        `).join('');

        document.querySelectorAll('.promo-card').forEach(card => {
          card.addEventListener('click', () => {
            window.location.href = `match-detail.html?matchId=${card.dataset.matchId}`;
          });
        });
      } catch (err) {
        container.innerHTML = `<p class="error-msg">${err.message}</p>`;
      }
    }
    loadMatches();
  </script>
</body>
</html>
