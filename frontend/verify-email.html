<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verify Phone - Fantasy App</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="topbar"><h1>Fantasy League</h1></div>
  <div class="container">
    <div class="card">
      <h2>Verify Your Phone</h2>
      <p class="match-meta">We texted a 6-digit code to <strong id="phoneDisplay"></strong>. Enter it below.</p>
      <label>Verification Code</label>
      <input type="text" id="code" inputmode="numeric" maxlength="6" placeholder="123456">
      <button class="btn" id="verifyBtn">Verify</button>
      <div class="error-msg" id="errorMsg"></div>
      <div class="success-msg" id="successMsg"></div>
      <div class="link">
        Didn't get a code? <a href="#" id="resendLink">Resend code</a>
      </div>
    </div>
  </div>

  <script>window.API_BASE_URL = 'https://fantasy-app-backend-znyu.onrender.com/api';</script>
  <script src="js/api.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const email = params.get('email');
    const phone = params.get('phone');
    if (!email) window.location.href = 'signup.html';
    document.getElementById('phoneDisplay').textContent = phone || 'the phone number on your account';

    document.getElementById('verifyBtn').addEventListener('click', async () => {
      const code = document.getElementById('code').value.trim();
      const errorMsg = document.getElementById('errorMsg');
      const successMsg = document.getElementById('successMsg');
      errorMsg.textContent = '';
      successMsg.textContent = '';

      if (!code) {
        errorMsg.textContent = 'Enter the code sent to your phone';
        return;
      }

      try {
        const { token, user } = await Api.verifyEmail({ email, code });
        Auth.setSession(token, user);
        window.location.href = user.role === 'admin' ? 'admin/dashboard.html' : 'matches.html';
      } catch (err) {
        errorMsg.textContent = err.message;
      }
    });

    document.getElementById('resendLink').addEventListener('click', async (e) => {
      e.preventDefault();
      const errorMsg = document.getElementById('errorMsg');
      const successMsg = document.getElementById('successMsg');
      errorMsg.textContent = '';
      try {
        await Api.resendCode({ email, purpose: 'verify_phone' });
        successMsg.textContent = 'A new code has been texted to your phone.';
      } catch (err) {
        errorMsg.textContent = err.message;
      }
    });
  </script>
</body>
</html>
