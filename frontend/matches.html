<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matches - Fantasy App</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body class="themed">
  <div class="topbar">
    <h1>Matches</h1>
    <button id="logoutBtn">Log Out</button>
  </div>
  <div class="container" id="matchList">
    <div class="card"><p>Loading matches...</p></div>
  </div>

  <script>window.API_BASE_URL = 'https://fantasy-app-backend-znyu.onrender.com/api';</script>
  <script src="js/api.js"></script>
  <script>
    requireLogin();

    document.getElementById('logoutBtn').addEventListener('click', () => {
      Auth.clearSession();
      window.location.href = 'login.html';
    });

    function statusLabel(status) {
      return { upcoming: 'Selection Open', locked: 'Selection Closed', completed: 'Completed' }[status] || status;
    }

    function teamLogo(team) {
      if (team?.logo_url) {
        return `<img src="${team.logo_url}" class="promo-team-logo" alt="${team.short_code || team.name}">`;
      }
      return `<div class="promo-team-logo-fallback">${(team?.short_code || '?').slice(0, 3)}</div>`;
    }

    async function loadMatches() {
      const container = document.getElementById('matchList');
      try {
        const matches = await Api.getMatches();
        if (matches.length === 0) {
          container.innerHTML = '<div class="card"><p>No matches scheduled yet.</p></div>';
          return;
        }
        container.innerHTML = matches.map(m => {
          const target = m.status === 'completed'
            ? `results.html?matchId=${m.id}`
            : `team-select.html?matchId=${m.id}`;

          return `
          <div class="promo-card" data-target="${target}" data-match-id="${m.id}">
            ${m.match_format ? `<div class="promo-format-tag">${m.match_format}</div>` : ''}
            <div class="promo-teams">
              <div class="promo-team">
                ${teamLogo(m.team_a)}
                <span class="promo-team-name">${m.team_a?.name || m.team_a?.short_code || '?'}</span>
              </div>
              <span class="promo-vs">VS</span>
              <div class="promo-team">
                ${teamLogo(m.team_b)}
                <span class="promo-team-name">${m.team_b?.name || m.team_b?.short_code || '?'}</span>
              </div>
            </div>
            <div class="promo-info-row">
              <div class="promo-info-box">
                <span class="promo-info-label">Date &amp; Time</span>
                <span class="promo-info-value">${formatIST(m.match_date)}</span>
              </div>
              ${m.venue ? `
              <div class="promo-info-box">
                <span class="promo-info-label">Venue</span>
                <span class="promo-info-value">${m.venue}</span>
              </div>` : ''}
            </div>
            <div class="promo-status-badge promo-status-${m.status}">${statusLabel(m.status)}</div>
          </div>
        `;
        }).join('');

        document.querySelectorAll('.promo-card').forEach(card => {
          card.addEventListener('click', () => {
            window.location.href = card.dataset.target;
          });
        });
      } catch (err) {
        container.innerHTML = `<div class="card"><p class="error-msg">${err.message}</p></div>`;
      }
    }

    loadMatches();
  </script>
</body>
</html>
