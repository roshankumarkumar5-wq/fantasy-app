<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password - Fantasy App</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="topbar"><h1>Fantasy League</h1></div>
  <div class="container">
    <div class="card">
      <h2>Reset Password</h2>
      <p class="match-meta">Enter the code sent to <strong id="emailDisplay"></strong> and choose a new password.</p>
      <label>Reset Code</label>
      <input type="text" id="code" inputmode="numeric" maxlength="6" placeholder="123456">
      <label>New Password</label>
      <input type="password" id="newPassword" placeholder="At least 6 characters">
      <button class="btn" id="resetBtn">Reset Password</button>
      <div class="error-msg" id="errorMsg"></div>
      <div class="success-msg" id="successMsg"></div>
      <div class="link">
        Didn't get a code? <a href="#" id="resendLink">Resend code</a>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const email = params.get('email');
    if (!email) window.location.href = 'forgot-password.html';
    document.getElementById('emailDisplay').textContent = email;

    document.getElementById('resetBtn').addEventListener('click', async () => {
      const code = document.getElementById('code').value.trim();
      const new_password = document.getElementById('newPassword').value;
      const errorMsg = document.getElementById('errorMsg');
      const successMsg = document.getElementById('successMsg');
      errorMsg.textContent = '';
      successMsg.textContent = '';

      if (!code || !new_password) {
        errorMsg.textContent = 'Enter the code and a new password';
        return;
      }
      if (new_password.length < 6) {
        errorMsg.textContent = 'Password must be at least 6 characters';
        return;
      }

      try {
        await Api.resetPassword({ email, code, new_password });
        successMsg.textContent = 'Password reset! Redirecting to login...';
        setTimeout(() => window.location.href = 'login.html', 1200);
      } catch (err) {
        errorMsg.textContent = err.message;
      }
    });

    document.getElementById('resendLink').addEventListener('click', async (e) => {
      e.preventDefault();
      const errorMsg = document.getElementById('errorMsg');
      const successMsg = document.getElementById('successMsg');
      errorMsg.textContent = '';
      try {
        await Api.resendCode({ email, purpose: 'reset_password' });
        successMsg.textContent = 'A new code has been sent to your email.';
      } catch (err) {
        errorMsg.textContent = err.message;
      }
    });
  </script>
</body>
</html>
